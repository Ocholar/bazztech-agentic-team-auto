name: BazzAI Enterprise CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'pnpm'
        cache-dependency-path: './src/dashboard/pnpm-lock.yaml'
        
    - name: Install dependencies
      working-directory: ./src/dashboard
      run: pnpm install
      
    - name: Generate Prisma Client
      working-directory: ./src/dashboard
      run: pnpm prisma generate
      
    - name: Run Linter
      working-directory: ./src/dashboard
      run: pnpm lint
      
    - name: Run Tests
      working-directory: ./src/dashboard
      run: pnpm test
      
    - name: Build Next.js App
      working-directory: ./src/dashboard
      run: pnpm build
